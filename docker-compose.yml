version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# ezClinic — Local Development Stack
# Usage: docker compose up -d
#
# Public entry point : http://localhost:8000  (Kong proxy)
# Kong Admin API     : http://localhost:8001  (dev only — do not expose in prod)
# Frontend           : http://localhost:3000
# RabbitMQ UI        : http://localhost:15672  (guest / guest)
#
# Set KONG_URL in .env to change the public base URL baked into the frontend
# build (default: http://localhost:8000).
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ezclinic-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7-jammy
    container_name: ezclinic-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-password}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Backend Services ────────────────────────────────────────────────────────

  patient-admin-service:
    build:
      context: ./services/patient-admin-service
      dockerfile: Dockerfile
    container_name: ezclinic-patient-admin
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: ${PATIENT_DB_URL}
      DOCTOR_SERVICE_URL: http://doctor-service:3002/api/v1
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  doctor-service:
    build:
      context: ./services/doctor-service
      dockerfile: Dockerfile
    container_name: ezclinic-doctor
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGO_URI: ${MONGO_URI:-mongodb://admin:password@mongodb:27017/doctor_db?authSource=admin}
      APPOINTMENT_SERVICE_URL: http://appointment-booking-service:3004/api/v1
      PATIENT_SERVICE_URL: http://patient-admin-service:3005/api/v1
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  appointment-booking-service:
    build:
      context: ./services/appointment-booking-service
      dockerfile: Dockerfile
    container_name: ezclinic-appointment
    ports:
      - "3004:3004"
    environment:
      SUPABASE_DB_URL: ${APPOINTMENT_DB_URL}
      SUPABASE_DB_USER: ${APPOINTMENT_DB_USER:-postgres}
      SUPABASE_DB_PASSWORD: ${APPOINTMENT_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      PAYHERE_MERCHANT_ID: ${PAYHERE_MERCHANT_ID}
      PAYHERE_MERCHANT_SECRET: ${PAYHERE_MERCHANT_SECRET}
      PAYHERE_NOTIFY_URL: ${PAYHERE_NOTIFY_URL:-http://localhost:8000/api/payments/payhere/notify}
      PAYHERE_RETURN_URL: ${PAYHERE_RETURN_URL:-http://localhost:3000/appointments?status=success}
      PAYHERE_CANCEL_URL: ${PAYHERE_CANCEL_URL:-http://localhost:3000/appointments?status=cancelled}
      DOCTOR_SERVICE_URL: http://doctor-service:3002/api/v1/doctors
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  telemedicine-notification-service:
    build:
      context: ./services/telemedicine-notification-service
      dockerfile: Dockerfile
    container_name: ezclinic-telemedicine
    ports:
      - "8090:8090"
    environment:
      PORT: 8090
      DB_USER: ${TELEMEDICINE_DB_USER:-postgres}
      DB_PASSWORD: ${TELEMEDICINE_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      MAILTRAP_API_KEY: ${MAILTRAP_API_KEY}
      SENDER: ${MAILTRAP_SENDER:-noreply@ezclinic.com}
      JITSI_DOMAIN: ${JITSI_DOMAIN:-meet.jit.si}
      JITSI_APP_ID: ${JITSI_APP_ID}
      JITSI_APP_SECRET: ${JITSI_APP_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      APPOINTMENT_SERVICE_URL: http://appointment-booking-service:3004/api/v1
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── API Gateway ─────────────────────────────────────────────────────────────

  kong:
    image: kong:3.9-ubuntu
    container_name: ezclinic-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    ports:
      - "8000:8000"   # Public proxy — all client API calls go here
      - "8001:8001"   # Admin API — expose only in dev / behind VPN in prod
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      - doctor-service
      - patient-admin-service
      - appointment-booking-service
      - telemedicine-notification-service
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked into the JS bundle at build time.
        # KONG_URL must be reachable from the user's browser (not the container).
        # Override KONG_URL in .env for staging / production deployments.
        NEXT_PUBLIC_DOCTOR_API: ${KONG_URL:-http://localhost:8000}/api/v1
        NEXT_PUBLIC_PATIENT_API: ${KONG_URL:-http://localhost:8000}/api/v1
        NEXT_PUBLIC_APPOINTMENT_API: ${KONG_URL:-http://localhost:8000}/api/v1
        NEXT_PUBLIC_TELEMEDICINE_API: ${KONG_URL:-http://localhost:8000}/api/v1
    container_name: ezclinic-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      APP_BASE_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Server-side calls from Next.js API routes use internal Docker DNS —
      # these bypass Kong and hit services directly.
      INTERNAL_DOCTOR_API: http://doctor-service:3002/api/v1
      INTERNAL_PATIENT_API: http://patient-admin-service:3005/api/v1
      INTERNAL_APPOINTMENT_API: http://appointment-booking-service:3004/api/v1
      INTERNAL_TELEMEDICINE_API: http://telemedicine-notification-service:8090/api/v1
    depends_on:
      kong:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  rabbitmq_data:
  mongodb_data:
