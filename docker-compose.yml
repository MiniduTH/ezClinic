version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# ezClinic — Local Development Stack
# Usage: docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ezclinic-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7-jammy
    container_name: ezclinic-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-password}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Backend Services ────────────────────────────────────────────────────────

  patient-admin-service:
    build:
      context: ./services/patient-admin-service
      dockerfile: Dockerfile
    container_name: ezclinic-patient-admin
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: ${SUPABASE_DB_URL}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-dev-6x78k6ttww4d1cif.us.auth0.com}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://api.ezclinic.com}
      DOCTOR_SERVICE_URL: http://doctor-service:3002/api/v1
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  doctor-service:
    build:
      context: ./services/doctor-service
      dockerfile: Dockerfile
    container_name: ezclinic-doctor
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGO_URI: ${MONGO_URI:-mongodb://admin:password@mongodb:27017/doctor_db?authSource=admin}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-dev-6x78k6ttww4d1cif.us.auth0.com}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://api.ezclinic.com}
      APPOINTMENT_SERVICE_URL: http://appointment-payment-service:3004/api/v1
      PATIENT_SERVICE_URL: http://patient-admin-service:3005/api/v1
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  appointment-payment-service:
    build:
      context: ./services/appointment-payment-service
      dockerfile: Dockerfile
    container_name: ezclinic-appointment
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      SUPABASE_DB_URL: ${SUPABASE_DB_URL}
      SUPABASE_DB_USER: ${SUPABASE_DB_USER:-postgres}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-dev-6x78k6ttww4d1cif.us.auth0.com}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://api.ezclinic.com}
      PAYHERE_MERCHANT_ID: ${PAYHERE_MERCHANT_ID}
      PAYHERE_MERCHANT_SECRET: ${PAYHERE_MERCHANT_SECRET}
      DOCTOR_SERVICE_URL: http://doctor-service:3002/api/v1
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  telemedicine-notification-service:
    build:
      context: ./services/telemedicine-notification-service
      dockerfile: Dockerfile
    container_name: ezclinic-telemedicine
    ports:
      - "8090:8090"
    environment:
      PORT: 8090
      DB_URL: ${SUPABASE_DB_URL}
      DB_USER: ${SUPABASE_DB_USER:-postgres}
      DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-dev-6x78k6ttww4d1cif.us.auth0.com}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://api.ezclinic.com}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      MAILTRAP_API_KEY: ${MAILTRAP_API_KEY}
      SENDER: ${MAILTRAP_SENDER:-noreply@ezclinic.com}
      JITSI_DOMAIN: ${JITSI_DOMAIN:-meet.jit.si}
      JITSI_APP_ID: ${JITSI_APP_ID}
      JITSI_APP_SECRET: ${JITSI_APP_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      APPOINTMENT_SERVICE_URL: http://appointment-payment-service:3004/api/v1
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ezclinic-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      AUTH0_SECRET: ${AUTH0_SECRET}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-dev-6x78k6ttww4d1cif.us.auth0.com}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-lnaFzpt1SRXRwizxj9XMYkQV4BsJvXuD}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://api.ezclinic.com}
      APP_BASE_URL: ${FRONTEND_URL:-http://localhost:3000}
      NEXT_PUBLIC_PATIENT_API: http://patient-admin-service:3005/api/v1
      NEXT_PUBLIC_DOCTOR_API: http://doctor-service:3002/api/v1
      NEXT_PUBLIC_APPOINTMENT_API: http://appointment-payment-service:3004/api/v1
      NEXT_PUBLIC_TELEMEDICINE_API: http://telemedicine-notification-service:8090/api/v1
    depends_on:
      - patient-admin-service
      - doctor-service
      - appointment-payment-service
      - telemedicine-notification-service
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  rabbitmq_data:
  mongodb_data:
