spring.application.name=appointment-service
server.port=3004
spring.config.import=optional:file:.env[.properties]

# Supabase PostgreSQL Database Configuration
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# PayHere Config
payhere.merchant.id=${PAYHERE_MERCHANT_ID:1234567}
payhere.merchant.secret=${PAYHERE_MERCHANT_SECRET:DEFAULT_SECRET}
payhere.sandbox=true

# RabbitMQ Config
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Doctor Service Configuration
service.doctor.url=${DOCTOR_SERVICE_URL:http://localhost:3002/api/doctors}
