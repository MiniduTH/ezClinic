server:
  port: ${PORT:3004}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: appointment-payment-service
  config:
    import: optional:file:.env[.properties]

  # ── Datasource ──
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

payhere:
  merchant-id: ${PAYHERE_MERCHANT_ID:}
  merchant-secret: ${PAYHERE_MERCHANT_SECRET:}

services:
  doctor-service-url: ${DOCTOR_SERVICE_URL:http://localhost:3002/api/v1}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

jwt:
  secret: ${JWT_SECRET}

app:
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000}
