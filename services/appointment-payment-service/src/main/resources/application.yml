server:
  port: ${PORT:3004}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: appointment-payment-service
  config:
    import: optional:file:.env[.properties]

  # ── JPA / Hibernate ──
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://${AUTH0_DOMAIN:your-tenant.auth0.com}/
          audiences: ${AUTH0_AUDIENCE:https://api.ezclinic.com}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_xxxx}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_xxxx}

services:
  doctor-service-url: ${DOCTOR_SERVICE_URL:http://localhost:3002/api/v1}
  auth-service-url: ${AUTH_SERVICE_URL:http://localhost:3003/api/v1}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

app:
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000}
