server:
  port: ${PORT:3004}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: appointment-payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://${AUTH0_DOMAIN:your-tenant.auth0.com}/
          audiences: ${AUTH0_AUDIENCE:https://api.ezclinic.com}

payhere:
  merchant-id: ${PAYHERE_MERCHANT_ID:}
  merchant-secret: ${PAYHERE_MERCHANT_SECRET:}

services:
  doctor-service-url: ${DOCTOR_SERVICE_URL:http://localhost:3002/api/v1}
  auth-service-url: ${AUTH_SERVICE_URL:http://localhost:3003/api/v1}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

app:
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000}
