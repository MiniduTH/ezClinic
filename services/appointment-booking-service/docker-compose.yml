version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: ezclinic-rabbitmq
    ports:
      - "5672:5672"   # Message broker port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  appointment-service:
    build: .
    container_name: ezclinic-appointment-service
    ports:
      - "3004:3004"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      - SUPABASE_DB_USER=${SUPABASE_DB_USER}
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - PAYHERE_MERCHANT_ID=${PAYHERE_MERCHANT_ID}
      - PAYHERE_MERCHANT_SECRET=${PAYHERE_MERCHANT_SECRET}
      - DOCTOR_SERVICE_URL=${DOCTOR_SERVICE_URL}
