server:
  port: ${PORT:3003}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: auth-service
  config:
    import: optional:file:.env[.properties]

  # ── JPA / Hibernate ──
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ezclinic_auth_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── OAuth2 Resource Server (Auth0 JWT) ──
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://${AUTH0_DOMAIN:your-tenant.auth0.com}/
          audiences: ${AUTH0_AUDIENCE:https://api.ezclinic.com}

  # ── RabbitMQ ──
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

# ── Auth0 Management API (for user registration) ──
auth0:
  domain: ${AUTH0_DOMAIN:your-tenant.auth0.com}
  audience: ${AUTH0_AUDIENCE:https://api.ezclinic.com}
  client-id: ${AUTH0_CLIENT_ID:}
  client-secret: ${AUTH0_CLIENT_SECRET:}

# ── Swagger / OpenAPI ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ── CORS ──
app:
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000}
